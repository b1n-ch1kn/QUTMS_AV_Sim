# Minimal controller config based on working gz_ros2_control_demos
# Start with demo config that WORKS, then incrementally add our params

controller_manager:
  ros__parameters:
    update_rate: 100  # Hz - same as demo

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    ackermann_steering_controller:
      type: ackermann_steering_controller/AckermannSteeringController

ackermann_steering_controller:
  ros__parameters:
    # Demo values (known to work)
    # wheelbase: 1.7
    # traction_track_width: 1.0
    # steering_track_width: 1.0
    # traction_wheels_radius: 0.3
    # steering_wheels_radius: 0.3
    
    # Our vehicle values
    wheelbase: 1.580
    traction_track_width: 1.400
    steering_track_width: 1.400
    traction_wheels_radius: 0.2032
    steering_wheels_radius: 0.2032
    
    reference_timeout: 2.0
    
    # Joint names - MUST match URDF
    traction_joints_names: ['rear_right_wheel_joint', 'rear_left_wheel_joint']
    steering_joints_names: ['right_steering_hinge_joint', 'left_steering_hinge_joint']
    
    # Critical parameters from demo
    open_loop: false
    velocity_rolling_window_size: 10
    position_feedback: false
    
    # Frame IDs
    base_frame_id: base_footprint
    odom_frame_id: track
    enable_odom_tf: true
    
    # Covariance (demo values)
    twist_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
    pose_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
