/**:
  controller_manager:
    ros__parameters:
      update_rate: 100  # Hz - matches our other plugin update rates

      # Joint State Broadcaster - publishes joint states to /joint_states
      joint_state_broadcaster:
        type: joint_state_broadcaster/JointStateBroadcaster
      
      # Ackermann Steering Controller - bicycle model control
      ackermann_steering_controller:
        type: ackermann_steering_controller/AckermannSteeringController
      
      # Effort Controllers - individual wheel torque control
      front_left_wheel_controller:
        type: effort_controllers/JointGroupEffortController
      
      front_right_wheel_controller:
        type: effort_controllers/JointGroupEffortController
      
      rear_left_wheel_controller:
        type: effort_controllers/JointGroupEffortController
      
      rear_right_wheel_controller:
        type: effort_controllers/JointGroupEffortController
      
      # Velocity Controllers - individual wheel velocity control (TESTING)
      front_left_wheel_velocity_controller:
        type: velocity_controllers/JointGroupVelocityController
      
      front_right_wheel_velocity_controller:
        type: velocity_controllers/JointGroupVelocityController
      
      rear_left_wheel_velocity_controller:
        type: velocity_controllers/JointGroupVelocityController
      
      rear_right_wheel_velocity_controller:
        type: velocity_controllers/JointGroupVelocityController


  # ============================================================================
  # Ackermann Steering Controller Configuration
  # ============================================================================
  # Bicycle model controller - converts cmd_vel to steering + wheel commands
  # Uses EFFORT (torque) commands for rear wheels (physics simulation)
  # Uses POSITION commands for steering joints

  ackermann_steering_controller:
    ros__parameters:

      # Our vehicle values
      wheelbase: 1.580
      traction_track_width: 1.400
      steering_track_width: 1.400
      traction_wheels_radius: 0.2032
      steering_wheels_radius: 0.2032
      
      reference_timeout: 2.0
      
      # Joint names - MUST match URDF
      traction_joints_names: ['rear_right_wheel_joint', 'rear_left_wheel_joint']
      steering_joints_names: ['right_steering_hinge_joint', 'left_steering_hinge_joint']
      
      # Critical parameters from demo
      open_loop: false
      velocity_rolling_window_size: 10
      position_feedback: false
      
      # Frame IDs
      base_frame_id: base_footprint
      odom_frame_id: track
      enable_odom_tf: true
      
      # Covariance (demo values)
      twist_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]
      pose_covariance_diagonal: [0.0, 7.0, 14.0, 21.0, 28.0, 35.0]


  # ============================================================================
  # Individual Wheel Effort Controllers
  # ============================================================================
  # These provide direct torque control to each wheel
  # Can be used for traction control, differential braking, etc.
  #
  # WARNING: Do NOT use rear wheel effort controllers simultaneously with
  # ackermann_steering_controller! They will conflict.
  # 
  # Current setup: Ackermann controller uses velocity interface for rear wheels.
  # The effort controllers below are defined but should NOT be spawned for rear
  # wheels unless you switch Ackermann to effort interface or front-wheel drive.

  front_left_wheel_controller:
    ros__parameters:
      joints:
        - front_left_wheel_joint
      interface_name: effort
      command_interfaces:
        - effort
      state_interfaces:
        - position
        - velocity

  front_right_wheel_controller:
    ros__parameters:
      joints:
        - front_right_wheel_joint
      interface_name: effort
      command_interfaces:
        - effort
      state_interfaces:
        - position
        - velocity

  rear_left_wheel_controller:
    ros__parameters:
      joints:
        - rear_left_wheel_joint
      interface_name: effort
      command_interfaces:
        - effort
      state_interfaces:
        - position
        - velocity

  rear_right_wheel_controller:
    ros__parameters:
      joints:
        - rear_right_wheel_joint
      interface_name: effort
      command_interfaces:
        - effort
      state_interfaces:
        - position
        - velocity

  # Velocity controllers for testing
  front_left_wheel_velocity_controller:
    ros__parameters:
      joints:
        - front_left_wheel_joint
      interface_name: velocity
      command_interfaces:
        - velocity
      state_interfaces:
        - position
        - velocity

  front_right_wheel_velocity_controller:
    ros__parameters:
      joints:
        - front_right_wheel_joint
      interface_name: velocity
      command_interfaces:
        - velocity
      state_interfaces:
        - position
        - velocity

  rear_left_wheel_velocity_controller:
    ros__parameters:
      joints:
        - rear_left_wheel_joint
      interface_name: velocity
      command_interfaces:
        - velocity
      state_interfaces:
        - position
        - velocity

  rear_right_wheel_velocity_controller:
    ros__parameters:
      joints:
        - rear_right_wheel_joint
      interface_name: velocity
      command_interfaces:
        - velocity
      state_interfaces:
        - position
        - velocity
